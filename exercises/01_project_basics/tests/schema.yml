version: 2

models:
  - name: stg_orders
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: status
        tests:
          - accepted_values:
              arguments:
                values: ['completed', 'pending'] # TODO: 'returned' は stg で除外されるはず

  - name: dim_customers
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      # TODO: number_of_orders に対するテストを追加してください（例: not_null）
